<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Workouts">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" id="theme-meta" content="#534AB7">
  <title>Workout Tracker</title>
</head>

<body>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --color-text-primary: #1C1B1A;
      --color-text-secondary: #6B6966;
      --color-text-tertiary: #9E9B98;
      --color-background-primary: #FFFFFF;
      --color-background-secondary: #F5F4F2;
      --color-border-secondary: #C4C2BE;
      --color-border-tertiary: #E8E6E2;
      --lp-bg: #EEEDFE;
      --lp-title: #3C3489;
      --lp-sets: #534AB7;
      --lp-note: #7F77DD;
      --nav-active-bg: #EEEDFE;
      --nav-active-color: #3C3489;
      --nav-active-border: #AFA9EC;
      --badge-accent-bg: #EEEDFE;
      --badge-accent-color: #3C3489;
    }

    [data-theme="dark"] {
      --color-text-primary: #F0EFED;
      --color-text-secondary: #A09C99;
      --color-text-tertiary: #6A6664;
      --color-background-primary: #1C1C1E;
      --color-background-secondary: #2C2C2E;
      --color-border-secondary: #545456;
      --color-border-tertiary: #3A3A3C;
      --lp-bg: #2A2848;
      --lp-title: #AFA9EC;
      --lp-sets: #8B83E8;
      --lp-note: #6F68C4;
      --nav-active-bg: #2A2848;
      --nav-active-color: #AFA9EC;
      --nav-active-border: #534AB7;
      --badge-accent-bg: #2A2848;
      --badge-accent-color: #AFA9EC;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      font-size: 15px;
      background: var(--color-background-primary);
      padding-bottom: env(safe-area-inset-bottom, 20px)
    }

    input,
    select,
    textarea {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--color-text-primary);
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 8px;
      padding: 8px 10px;
      width: 100%;
      outline: none
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #534AB7;
      box-shadow: 0 0 0 2px rgba(83, 74, 183, 0.12)
    }

    textarea {
      resize: vertical;
      min-height: 60px
    }

    button {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 14px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-primary);
      transition: background .15s
    }

    button:hover {
      background: var(--color-background-secondary)
    }

    button:active {
      transform: scale(0.98)
    }

    .btn-primary {
      background: #534AB7;
      color: #EEEDFE;
      border-color: #534AB7
    }

    .btn-primary:hover {
      background: #3C3489;
      border-color: #3C3489;
      color: #EEEDFE
    }

    .btn-danger {
      color: #A32D2D;
      border-color: #F09595
    }

    .btn-danger:hover {
      background: #FCEBEB
    }

    [data-theme="dark"] .btn-danger:hover {
      background: #3D1A1A
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px
    }

    .muted {
      color: var(--color-text-secondary);
      font-size: 13px
    }

    .nav {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding-bottom: 12px
    }

    .nav button {
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500
    }

    .nav button.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-color);
      border: 0.5px solid var(--nav-active-border)
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px
    }

    .stat-card {
      background: var(--color-background-secondary);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center
    }

    .stat-val {
      font-size: 20px;
      font-weight: 500
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--color-text-secondary);
      margin-top: 2px
    }

    .exercise-item {
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--color-background-primary)
    }

    .last-perf {
      background: var(--lp-bg);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 12px
    }

    .last-perf-title {
      font-weight: 500;
      color: var(--lp-title);
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .last-perf-sets {
      color: var(--lp-sets);
      line-height: 1.6
    }

    .last-perf-note {
      color: var(--lp-note);
      font-style: italic;
      margin-top: 3px;
      font-size: 11px
    }

    .set-row {
      display: grid;
      grid-template-columns: 22px 1fr 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 5px
    }

    .set-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--color-background-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary)
    }

    .history-entry {
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px
    }

    .progress-wrap {
      height: 5px;
      background: var(--color-border-tertiary);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px
    }

    .progress-bar {
      height: 100%;
      border-radius: 3px
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 5px
    }

    .badge-accent {
      background: var(--badge-accent-bg);
      color: var(--badge-accent-color)
    }

    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--color-text-tertiary);
      font-size: 14px
    }

    .sync-bar {
      font-size: 12px;
      color: var(--color-text-secondary);
      padding: 7px 10px;
      background: var(--color-background-secondary);
      border-radius: 8px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .dot.green {
      background: #1D9E75
    }

    .dot.amber {
      background: #EF9F27;
      animation: pulse 1s infinite
    }

    .dot.red {
      background: #E24B4A
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .loading {
      text-align: center;
      padding: 48px 16px;
      color: var(--color-text-secondary);
      font-size: 14px
    }

    .sec-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      margin: 16px 0 8px
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0
    }
  </style>

      }
      html += `</div><div id="sync-bar" class="sync-bar" style="display:none"></div>`;
      if (view === 'confirm') { html += renderConfirm(); app.innerHTML = html; return; }
      html += `<div class="nav"><button class="${view === 'log' ? 'active' : ''}" onclick="setView('log')">Log</button><button class="${view === 'history' ? 'active' : ''}" onclick="setView('history')">History</button><button class="${view === 'progress' ? 'active' : ''}" onclick="setView('progress')">Progress</button><button class="${view === 'settings' ? 'active' : ''}" onclick="setView('settings')">Settings</button><button class="${view === 'adduser' ? 'active' : ''}" onclick="setView('adduser')">Add User</button></div>`;
      if (view === 'log') html += renderLog(p);
      else if (view === 'history') html += renderHistory();
      else if (view === 'progress') html += renderProgress(p);
      else if (view === 'settings') html += renderSettings(p);
      else if (view === 'adduser') html += renderAddUser();
      app.innerHTML = html;
    }

    function renderLog(p) {
      if (!draft) {
        const ss = profileSessions();
        const sets = ss.reduce((a, s) => a + s.exercises.reduce((b, e) => b + e.sets.length, 0), 0);
        let html = `<div class="grid3" style="margin-bottom:18px"><div class="stat-card"><div class="stat-val" style="color:${p.color}">${ss.length}</div><div class="stat-lbl">Sessions</div></div><div class="stat-card"><div class="stat-val" style="color:${p.color}">${ss.reduce((a, s) => a + s.exercises.length, 0)}</div><div class="stat-lbl">Exercises</div></div><div class="stat-card"><div class="stat-val" style="color:${p.color}">${sets}</div><div class="stat-lbl">Total sets</div></div></div>`;
        if (ss.length) {
          const last = ss[0];
          html += `<div style="margin-bottom:16px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)"><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">Last session — ${fmt(last.date)}</div>`;
          for (const e of last.exercises.slice(0, 4)) {
            const mx = Math.max(0, ...e.sets.map(s => parseFloat(s.weight) || 0));
            html += `<div style="font-size:13px;display:flex;justify-content:space-between;padding:2px 0"><span>${e.name}</span><span class="muted">${mx > 0 ? mx + ' lbs' : ''}</span></div>`;
          }
          if (last.exercises.length > 4) html += `<div style="font-size:12px;color:var(--color-text-tertiary);margin-top:4px">+${last.exercises.length - 4} more</div>`;
          if (last.note) html += `<div style="font-size:12px;font-style:italic;color:var(--color-text-tertiary);margin-top:6px;padding-top:6px;border-top:0.5px solid var(--color-border-tertiary)">${last.note}</div>`;
          html += `</div>`;
        }
        const todayExists = sessions.some(s => s.id === todaySessionId());
        return html + `<button class="btn-primary" style="width:100%;padding:12px;font-size:15px" onclick="startSession()">${todayExists ? 'Resume today\'s session' : 'Start new session'}</button>`;
      }

      const sessionDate = editing ? fmt(draft.date) : new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div><div style="font-size:16px;font-weight:500">${editing ? 'Edit session' : 'New session'}</div><div class="muted">${sessionDate}</div></div><button class="btn-danger btn-sm" onclick="cancelSession()">Cancel</button></div>`;

      for (let ei = 0; ei < draft.exercises.length; ei++) {
        const ex = draft.exercises[ei];
        const pb = maxWeight(ex.name);
        const lp = lastPerformance(ex.name);

        html += `<div class="exercise-item"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:500;font-size:14px">${ex.name}</div><button class="btn-danger btn-sm" onclick="removeEx(${ei})">Remove</button></div>`;

        if (lp) {
          const setStr = lp.sets.map(s => `${s.weight || '?'} × ${s.reps || '?'}`).join('  ·  ');
          html += `<div class="last-perf">
        <div class="last-perf-title">Last time — ${fmt(lp.date)}</div>
        <div class="last-perf-sets">${setStr}</div>
        ${lp.note ? `<div class="last-perf-note">${lp.note}</div>` : ''}
      </div>`;
        } else if (pb > 0) {
          html += `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Personal best: <b>${pb} lbs</b></div>`;
        }

        html += `<div style="display:grid;grid-template-columns:22px 1fr 1fr auto;gap:6px;margin-bottom:4px;font-size:11px;color:var(--color-text-secondary);padding:0 2px"><span></span><span>Weight (lbs)</span><span>Reps</span><span></span></div>`;
        for (let si = 0; si < ex.sets.length; si++) {
          const s = ex.sets[si];
          html += `<div class="set-row"><div class="set-num">${si + 1}</div><input type="number" placeholder="lbs" value="${s.weight || ''}" min="0" step="2.5" onchange="updSet(${ei},${si},'weight',this.value)" style="padding:7px 8px;text-align:center"><input type="number" placeholder="reps" value="${s.reps || ''}" min="0" step="1" onchange="updSet(${ei},${si},'reps',this.value)" style="padding:7px 8px;text-align:center"><button class="btn-sm btn-danger" onclick="removeSet(${ei},${si})" style="padding:5px 8px">x</button></div>`;
        }
        html += `<button onclick="addSet(${ei})" style="width:100%;margin-top:4px;padding:6px;font-size:12px;border-style:dashed">+ Add set</button></div>`;
      }

      html += `<div class="sec-label">Add exercise</div><div style="display:flex;gap:8px;margin-bottom:8px"><select id="ex-sel" style="flex:1"><option value="">Select exercise...</option>`;
      for (const e of allEx()) html += `<option value="${e}">${e}</option>`;
      html += `</select><button onclick="addExFromSel()">Add</button></div><div style="display:flex;gap:8px;margin-bottom:16px"><input id="custom-ex" type="text" placeholder="Or type a custom exercise..." style="flex:1"><button onclick="addCustomEx()">Add</button></div>`;
      html += `<div class="sec-label">Session notes</div><textarea id="sess-note" placeholder="How did it feel? PRs?" style="margin-bottom:16px">${draft.note || ''}</textarea>`;
      html += `<button class="btn-primary" style="width:100%;padding:12px;font-size:15px" onclick="saveSession()">${editing ? 'Update session' : 'Save session'}</button>`;
      return html;
    }

    function renderHistory() {
      const ss = profileSessions();
      if (!ss.length) return `<div class="empty">No sessions yet.<br>Start a workout to see history here.</div>`;
      let html = '';
      for (const s of ss) {
        html += `<div class="history-entry"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:500">${fmt(s.date)}</div><div style="display:flex;gap:6px"><button class="btn-sm" onclick="editSession('${s.id}')">Edit</button><button class="btn-danger btn-sm" onclick="delSession('${s.id}')">Delete</button></div></div>`;
        for (const e of s.exercises) {
          const v = e.sets.filter(x => x.weight || x.reps);
          if (!v.length) continue;
          const mx = Math.max(0, ...v.map(x => parseFloat(x.weight) || 0));
          const str = v.map(x => `${x.weight || '?'}×${x.reps || '?'}`).join('  ');
          html += `<div style="font-size:13px;margin-bottom:3px"><span style="font-weight:500">${e.name}</span><span class="muted" style="margin-left:6px;font-size:12px">${str}</span>${mx > 0 ? `<span class="badge badge-accent" style="margin-left:6px;font-size:10px">${mx} lbs</span>` : ''}</div>`;
          if (e.note) html += `<div style="font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-bottom:2px">${e.note}</div>`;
        }
        if (s.note) html += `<div style="font-size:12px;font-style:italic;color:var(--color-text-secondary);margin-top:6px;padding-top:6px;border-top:0.5px solid var(--color-border-tertiary)">${s.note}</div>`;
        html += `</div>`;
      }
      return html;
    }

    function renderProgress(p) {
      const ss = profileSessions();
      if (!ss.length) return `<div class="empty">Log sessions to see progress.</div>`;
      const map = {};
      for (const s of [...ss].reverse()) {
        for (const e of s.exercises) {
          const mx = Math.max(0, ...e.sets.map(x => parseFloat(x.weight) || 0));
          if (!mx) continue;
          if (!map[e.name]) map[e.name] = { first: mx, last: mx, peak: mx, count: 0 };
          else { map[e.name].last = mx; if (mx > map[e.name].peak) map[e.name].peak = mx; }
          map[e.name].count++;
        }
      }
      const entries = Object.entries(map).sort((a, b) => {
        const pa = a[1].first > 0 ? (a[1].last - a[1].first) / a[1].first : 0;
        const pb = b[1].first > 0 ? (b[1].last - b[1].first) / b[1].first : 0;
        return pb - pa;
      });
      if (!entries.length) return `<div class="empty">Add weights to sets to track progress.</div>`;
      let html = `<div class="sec-label">Strength progress — max weight</div>`;
      for (const [name, d] of entries) {
        const pct = d.first > 0 ? Math.round(((d.last - d.first) / d.first) * 100) : 0;
        const bw = d.peak > 0 ? Math.round((d.last / d.peak) * 100) : 100;
        const col = pct > 0 ? '#0F6E56' : pct < 0 ? '#A32D2D' : '#5F5E5A';
        const bg = pct > 0 ? '#E1F5EE' : pct < 0 ? '#FCEBEB' : '#F1EFE8';
        html += `<div style="margin-bottom:8px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:14px;font-weight:500">${name}</span><span class="badge" style="background:${bg};color:${col}">${pct > 0 ? '+' : ''}${pct}%</span></div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px"><span>Start: ${d.first} lbs</span><span>Now: ${d.last} lbs</span><span>Peak: ${d.peak} lbs</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${bw}%;background:${p.color}"></div></div></div>`;
      }
      return html;
    }

    function renderSettings(p) {
      let html = '';

      // User card
      html += `<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--color-background-secondary);border-radius:12px;border:0.5px solid var(--color-border-tertiary);margin-bottom:16px">`;
      html += `<span style="width:44px;height:44px;border-radius:50%;background:${p.color};display:inline-flex;align-items:center;justify-content:center;font-size:16px;color:${p.bg};font-weight:600;flex-shrink:0">${p.initials}</span>`;
      html += `<div><div style="font-size:16px;font-weight:500">${p.name}</div><div class="muted">${profileSessions().length} sessions logged</div></div>`;
      html += `</div>`;

      // Per-user actions
      html += `<div class="sec-label">Account</div>`;
      html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">`;
      html += `<button onclick="exportData()">Export my sessions</button>`;
      if (p.custom) {
        html += `<button class="btn-danger" onclick="confirmDeleteProfile('${p.id}')">Delete account</button>`;
      }
      html += `</div>`;

      // Edit profile colour (all profiles) and name (custom only)
      const currentColorIdx = PRESET_COLORS.findIndex(c => c.color === p.color);
      if (currentColorIdx >= 0) selectedColorIdx = currentColorIdx;
      const editColorIdx = currentColorIdx >= 0 ? currentColorIdx : selectedColorIdx;
      html += `<div class="sec-label">Edit profile</div>`;
      html += `<div style="padding:12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary);margin-bottom:16px">`;
      if (p.custom) html += `<input id="edit-profile-name" type="text" value="${p.name}" placeholder="Name" style="margin-bottom:8px">`;
      html += `<div style="display:flex;gap:8px;margin-bottom:10px">${PRESET_COLORS.map((c, i) => `<div id="cs-${i}" onclick="selectColor(${i})" style="width:28px;height:28px;border-radius:50%;background:${c.color};cursor:pointer;border:2px solid ${i === editColorIdx ? 'var(--color-text-primary)' : 'transparent'}"></div>`).join('')}</div>`;
      html += `<button onclick="saveProfileEdit('${p.id}')">Save changes</button>`;
      html += `</div>`;

      // Global: rename exercise
      html += `<div class="sec-label">Exercise names</div>`;
      const exNames = [...new Set(sessions.flatMap(s => s.exercises.map(e => e.name)))].sort();
      html += `<div style="padding:12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)">`;
      html += `<div style="font-size:13px;font-weight:500;margin-bottom:10px">Rename across all sessions</div>`;
      html += `<select id="rename-from" style="margin-bottom:8px"><option value="">Select exercise...</option>${exNames.map(n => `<option value="${n}">${n}</option>`).join('')}</select>`;
      html += `<div style="display:flex;gap:8px"><input id="rename-to" type="text" placeholder="New name" style="flex:1"><button onclick="renameExercise()">Rename</button></div>`;
      html += `</div>`;
      return html;
    }

    function renderAddUser() {
      let html = `<div style="padding:16px;background:var(--color-background-secondary);border-radius:12px;border:0.5px solid var(--color-border-tertiary)">`;
      html += `<div style="font-size:15px;font-weight:500;margin-bottom:14px">New user</div>`;
      html += `<input id="new-profile-name" type="text" placeholder="Name" style="margin-bottom:10px">`;
      html += `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">Pick a colour</div>`;
      html += `<div style="display:flex;gap:8px;margin-bottom:16px">${PRESET_COLORS.map((c, i) => `<div id="cs-${i}" onclick="selectColor(${i})" style="width:32px;height:32px;border-radius:50%;background:${c.color};cursor:pointer;border:2px solid ${i === selectedColorIdx ? 'var(--color-text-primary)' : 'transparent'}"></div>`).join('')}</div>`;
      html += `<button class="btn-primary" style="width:100%;padding:11px" onclick="addProfile()">Create user</button>`;
      html += `</div>`;
      return html;
    }

    function renderConfirm() {
      if (!pendingAction) return `<div class="empty">Nothing to confirm.</div>`;
      return `<div style="padding:48px 16px;text-align:center;max-width:380px;margin:0 auto">
        <div style="font-size:19px;font-weight:600;margin-bottom:10px">Are you sure?</div>
        <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:28px;line-height:1.6">${pendingAction.msg}</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn-danger" style="padding:10px 28px;font-size:15px" onclick="doConfirm()">Yes, delete</button>
          <button style="padding:10px 28px;font-size:15px" onclick="cancelConfirm()">Cancel</button>
        </div>
      </div>`;
    }

    function askConfirm(msg, fn, backView) { pendingAction = { msg, fn, backView: backView || view }; view = 'confirm'; render(); }
    async function doConfirm() {
      if (!pendingAction) return;
      const bv = pendingAction.backView;
      await pendingAction.fn();
      pendingAction = null;
      view = bv;
      render();
    }
    function cancelConfirm() { view = pendingAction ? pendingAction.backView : 'log'; pendingAction = null; render(); }

    function saveProfileEdit(id) {
      const c = PRESET_COLORS[selectedColorIdx];
      if (BASE_PROFILES.some(p => p.id === id)) {
        baseProfileOverrides[id] = { color: c.color, bg: c.bg };
      } else {
        const nameEl = document.getElementById('edit-profile-name');
        if (!nameEl || !nameEl.value.trim()) { alert('Enter a name.'); return; }
        const name = nameEl.value.trim();
        const p = customProfiles.find(p => p.id === id);
        if (!p) return;
        p.name = name; p.color = c.color; p.bg = c.bg; p.initials = name.slice(0, 2).toUpperCase();
      }
      buildProfiles();
      save(); render();
    }

    function confirmDeleteProfile(id) {
      const p = PROFILES.find(p => p.id === id);
      if (!p) return;
      const count = profileSessions(id).length;
      askConfirm(`Delete ${p.name} and all ${count} of their sessions? This cannot be undone.`, async () => {
        customProfiles = customProfiles.filter(cp => cp.id !== id);
        sessions = sessions.filter(s => s.profile !== id);
        buildProfiles();
        if (activeProfile === id) activeProfile = BASE_PROFILES[0].id;
        await save();
      }, 'settings');
    }

    function renameExercise() {
      const from = document.getElementById('rename-from');
      const to = document.getElementById('rename-to');
      if (!from || !to || !from.value || !to.value.trim()) { alert('Select an exercise and enter a new name.'); return; }
      const oldName = from.value;
      const newName = to.value.trim();
      for (const s of sessions) { for (const e of s.exercises) { if (e.name === oldName) e.name = newName; } }
      const idx = customExercises.indexOf(oldName);
      if (idx >= 0) customExercises[idx] = newName;
      save(); render();
    }

    function selectColor(i) {
      selectedColorIdx = i;
      PRESET_COLORS.forEach((_, j) => {
        const el = document.getElementById(`cs-${j}`);
        if (el) el.style.borderColor = j === i ? 'var(--color-text-primary)' : 'transparent';
      });
    }

    function addProfile() {
      const nameEl = document.getElementById('new-profile-name');
      if (!nameEl || !nameEl.value.trim()) { alert('Enter a name.'); return; }
      const name = nameEl.value.trim();
      const c = PRESET_COLORS[selectedColorIdx];
      const id = name.toLowerCase().replaceAll(/[^a-z0-9]/g, '_') + '_' + Date.now().toString(36);
      customProfiles.push({ id, name, color: c.color, bg: c.bg, initials: name.slice(0, 2).toUpperCase(), custom: true });
      PROFILES = [...BASE_PROFILES, ...customProfiles];
      activeProfile = id;
      selectedColorIdx = 0;
      save();
      view = 'log';
      render();
    }

    function exportData() {
      const p = profile();
      const userSessions = profileSessions();
      const blob = new Blob([JSON.stringify({ profile: p.name, sessions: userSessions }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${p.name.toLowerCase()}-workouts-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function switchProfile(id) { activeProfile = id; draft = null; render(); }
    function setView(v) { view = v; render(); }
    function startSession() { const todayId = todaySessionId(); const existing = sessions.find(s => s.id === todayId); draft = existing ? structuredClone(existing) : { id: todayId, profile: activeProfile, date: Date.now(), exercises: [], note: '' }; editing = false; render(); }
    function cancelSession() { draft = null; editing = false; render(); }

    async function saveSession() {
      const n = document.getElementById('sess-note');
      if (n) draft.note = n.value;
      if (!draft.exercises.length) { alert('Add at least one exercise.'); return; }
      const idx = sessions.findIndex(s => s.id === draft.id);
      if (idx >= 0) sessions[idx] = draft; else sessions.push(draft);
      editing = false;
      draft = null;
      await save(); view = 'history'; render();
    }
    function delSession(id) {
      const s = sessions.find(s => s.id === id);
      if (!s) return;
      askConfirm(`Delete the session from ${fmt(s.date)}? This cannot be undone.`, async () => {
        sessions = sessions.filter(x => x.id !== id);
        await save();
      }, 'history');
    }
    function editSession(id) {
      const s = sessions.find(s => s.id === id);
      if (!s) return;
      activeProfile = s.profile;
      draft = structuredClone(s);
      editing = true;
      view = 'log';
      render();
    }
    function addExFromSel() {
      const s = document.getElementById('ex-sel');
      if (!s || !s.value) return;
      saveNote();
      draft.exercises.push({ name: s.value, sets: [{ weight: '', reps: '' }], note: '' });
      render();
      autoSave();
    }
    function addCustomEx() {
      const i = document.getElementById('custom-ex');
      if (!i || !i.value.trim()) return;
      const n = i.value.trim();
      if (!customExercises.includes(n) && !EXERCISES.includes(n)) customExercises.push(n);
      saveNote();
      draft.exercises.push({ name: n, sets: [{ weight: '', reps: '' }], note: '' });
      render();
      autoSave();
    }
    function removeEx(ei) { saveNote(); draft.exercises.splice(ei, 1); render(); autoSave(); }
    function addSet(ei) { saveNote(); draft.exercises[ei].sets.push({ weight: '', reps: '' }); render(); autoSave(); }
    function removeSet(ei, si) {
      saveNote();
      draft.exercises[ei].sets.splice(si, 1);
      if (!draft.exercises[ei].sets.length) draft.exercises[ei].sets.push({ weight: '', reps: '' });
      render();
      autoSave();
    }
    function updSet(ei, si, f, v) { draft.exercises[ei].sets[si][f] = v; autoSave(); }
    function saveNote() { const n = document.getElementById('sess-note'); if (n && draft) draft.note = n.value; }

    globalThis.addEventListener('offline', () => {
      showSync('offline', 'No internet — changes saved locally');
    });
    globalThis.addEventListener('online', async () => {
      showSync('syncing', 'Back online — syncing...');
      try {
        const rec = await fetchBin();
        if (rec && rec.sessions && rec.sessions.length) {
          const localSnap = sessions;
          const merged = rec.sessions.map(rs => { const ls = localSnap.find(s => s.id === rs.id); return (ls && ls.exercises.length > rs.exercises.length) ? ls : rs; });
          const remoteIds = new Set(rec.sessions.map(s => s.id));
          sessions = [...merged, ...localSnap.filter(s => !remoteIds.has(s.id))];
          const remEx = rec.customExercises || [];
          customExercises = [...new Set([...remEx, ...customExercises])];
          const remProf = rec.customProfiles || [];
          const remProfIds = new Set(remProf.map(p => p.id));
          customProfiles = [...remProf, ...customProfiles.filter(p => !remProfIds.has(p.id))];
          baseProfileOverrides = { ...(rec.baseProfileOverrides || {}), ...baseProfileOverrides };
          buildProfiles();
          migrateNames();
          saveLocal();
        }
        await putBin({ sessions, customExercises, customProfiles, baseProfileOverrides });
        showSync('synced', 'Back online — synced');
        render();
      } catch {
        showSync('error', 'Sync failed');
      }
    });

    async function init() {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('./sw.js'); }
        catch (e) { console.warn('SW registration failed:', e); }
      }
      document.getElementById('app').innerHTML = '<div class="loading">Connecting to sync server...</div>';
      await load();
      render();
    }
    init();
  </script>
</body>

</html>
