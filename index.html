<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Workouts">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" id="theme-meta" content="#534AB7">
  <link rel="manifest" href="./manifest.json">
  <title>Workout Tracker</title>
</head>

<body>
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --color-text-primary: #1C1B1A;
      --color-text-secondary: #6B6966;
      --color-text-tertiary: #9E9B98;
      --color-background-primary: #FFFFFF;
      --color-background-secondary: #F5F4F2;
      --color-border-secondary: #C4C2BE;
      --color-border-tertiary: #E8E6E2;
      --lp-bg: #EEEDFE;
      --lp-title: #3C3489;
      --lp-sets: #534AB7;
      --lp-note: #7F77DD;
      --nav-active-bg: #EEEDFE;
      --nav-active-color: #3C3489;
      --nav-active-border: #AFA9EC;
      --badge-accent-bg: #EEEDFE;
      --badge-accent-color: #3C3489;
    }

    [data-theme="dark"] {
      --color-text-primary: #F0EFED;
      --color-text-secondary: #A09C99;
      --color-text-tertiary: #6A6664;
      --color-background-primary: #1C1C1E;
      --color-background-secondary: #2C2C2E;
      --color-border-secondary: #545456;
      --color-border-tertiary: #3A3A3C;
      --lp-bg: #2A2848;
      --lp-title: #AFA9EC;
      --lp-sets: #8B83E8;
      --lp-note: #6F68C4;
      --nav-active-bg: #2A2848;
      --nav-active-color: #AFA9EC;
      --nav-active-border: #534AB7;
      --badge-accent-bg: #2A2848;
      --badge-accent-color: #AFA9EC;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      font-size: 15px;
      background: var(--color-background-primary);
      padding-bottom: env(safe-area-inset-bottom, 20px)
    }

    input,
    select,
    textarea {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--color-text-primary);
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 8px;
      padding: 8px 10px;
      width: 100%;
      outline: none
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--profile-color, #534AB7);
      box-shadow: 0 0 0 2px var(--profile-color-faint, rgba(83, 74, 183, 0.12))
    }

    textarea {
      resize: vertical;
      min-height: 60px
    }

    button {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 14px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-primary);
      transition: background .15s
    }

    button:hover {
      background: var(--color-background-secondary)
    }

    button:active {
      transform: scale(0.98)
    }

    .btn-primary {
      background: var(--profile-color, #534AB7);
      color: var(--nav-active-bg, #EEEDFE);
      border-color: var(--profile-color, #534AB7)
    }

    .btn-primary:hover {
      background: var(--profile-color, #534AB7);
      border-color: var(--profile-color, #534AB7);
      color: var(--nav-active-bg, #EEEDFE);
      filter: brightness(0.88)
    }

    .btn-danger {
      color: #A32D2D;
      border-color: #F09595
    }

    .btn-danger:hover {
      background: #FCEBEB
    }

    [data-theme="dark"] .btn-danger:hover {
      background: #3D1A1A
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px
    }

    .muted {
      color: var(--color-text-secondary);
      font-size: 13px
    }

    .nav {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding-bottom: 12px
    }

    .nav button {
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500
    }

    .nav button.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-color);
      border: 0.5px solid var(--nav-active-border)
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px
    }

    .stat-card {
      background: var(--color-background-secondary);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: center
    }

    .stat-val {
      font-size: 20px;
      font-weight: 500
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--color-text-secondary);
      margin-top: 2px
    }

    .exercise-item {
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--color-background-primary)
    }

    .last-perf {
      background: var(--lp-bg);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 12px
    }

    .last-perf-title {
      font-weight: 500;
      color: var(--lp-title);
      margin-bottom: 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .last-perf-sets {
      color: var(--lp-sets);
      line-height: 1.6
    }

    .last-perf-note {
      color: var(--lp-note);
      font-style: italic;
      margin-top: 3px;
      font-size: 11px
    }

    .set-row {
      display: grid;
      grid-template-columns: 22px 1fr 1fr auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 5px
    }

    .set-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--color-background-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-text-secondary)
    }

    .history-entry {
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px
    }

    .progress-wrap {
      height: 5px;
      background: var(--color-border-tertiary);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px
    }

    .progress-bar {
      height: 100%;
      border-radius: 3px
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 5px
    }

    .badge-accent {
      background: var(--badge-accent-bg);
      color: var(--badge-accent-color)
    }

    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--color-text-tertiary);
      font-size: 14px
    }

    .sync-bar {
      font-size: 12px;
      color: var(--color-text-secondary);
      padding: 7px 10px;
      background: var(--color-background-secondary);
      border-radius: 8px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .dot.green {
      background: #1D9E75
    }

    .dot.amber {
      background: #EF9F27;
      animation: pulse 1s infinite
    }

    .dot.red {
      background: #E24B4A
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .loading {
      text-align: center;
      padding: 48px 16px;
      color: var(--color-text-secondary);
      font-size: 14px
    }

    .sec-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--color-text-secondary);
      text-transform: uppercase;
      margin: 16px 0 8px
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0
    }
  </style>

    let sessions = [], customExercises = {}, customProfiles = [], plans = [], activeProfile = localStorage.getItem('wt-profile') || 'jimmy', view = 'log', draft = null, editing = false, pendingAction = null, planEditDraft = null, progressMode = 'progress', timerEnd = null, timerInterval = null, timerDuration = 90, expandedExercise = null, chartMode = 'max', guideBase = 'e1rm';
    function startTimer(secs) { timerDuration = secs; if (timerInterval) clearInterval(timerInterval); timerEnd = Date.now() + secs * 1000; tickTimer(); timerInterval = setInterval(tickTimer, 1000); }

        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    function migrateCustomEx(val) { if (Array.isArray(val)) { const o = {}; for (const p of PROFILES) { o[p.id] = [...val]; } return o; } return val || {}; }
    function mergeCustomEx(a, b) { const m = { ...a }; for (const [pid, list] of Object.entries(b)) m[pid] = [...new Set([...(list || []), ...(m[pid] || [])])]; return m; }
    let darkMode = localStorage.getItem('wt-dark') === '1';

    applyTheme();
    const LS_KEY = 'wt-data-v1';

    const NAME_MAP = { 'Bench press': 'Bench Press', 'Biscep Curl': 'Bicep Curl', 'lateral raise': 'Lateral Raise', 'abdominal': 'Abdominal', 'calf raise': 'Calf Raise', 'tricep cable': 'Tricep Cable', 'cable triceps': 'Tricep Cable', 'linear leg press': 'Linear Leg Press', 'incline dumbell': 'Incline Dumbbell', 'biscep cable': 'Bicep Cable', 'biscep cable unilateral': 'Bicep Cable Unilateral', 'Dumbbell bench press': 'Dumbbell Chest Press', 'pectoral fly': 'Pectoral Fly', 'Rear deltoid': 'Rear Deltoid', 'Lat pulldown': 'Lat Pulldown' };
    function migrateNames() { for (const s of sessions) { for (const e of s.exercises) { const n = NAME_MAP[e.name]; if (n) e.name = n; } } }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function todaySessionId() { const d = new Date(); return `${activeProfile}_${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
    function fmt(ts) { return new Date(ts).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }); }
    function profile() { return PROFILES.find(p => p.id === activeProfile) || PROFILES[0]; }
    function profileSessions(pid) { return sessions.filter(s => s.profile === (pid || activeProfile)).sort((a, b) => b.date - a.date); }
    function maxWeight(n) { let m = 0; for (const s of profileSessions()) { for (const e of s.exercises) { if (e.name === n) { for (const x of e.sets) { const w = parseFloat(x.weight) || 0; if (w > m) m = w; } } } } return m; }
    function historicalMaxWeight(n) { let m = 0; for (const s of profileSessions()) { if (draft && s.id === draft.id) continue; for (const e of s.exercises) { if (e.name === n) { for (const x of e.sets) { const w = parseFloat(x.weight) || 0; if (w > m) m = w; } } } } return m; }
    function checkPR(input, pb) { const sn = input.closest('.set-row').querySelector('.set-num'); if (!sn) return; const isPR = pb > 0 && (parseFloat(input.value) || 0) > pb; sn.style.background = isPR ? '#FEF3C7' : ''; sn.style.color = isPR ? '#92400E' : ''; }
    function toggleBW(ei) { saveNote(); draft.exercises[ei].bodyweight = !draft.exercises[ei].bodyweight; render(); autoSave(); }

    function allEx() { return [...new Set([...EXERCISES, ...(customExercises[activeProfile] || [])])].sort(); }

    function lastPerformance(name) {

          const valid = ex.sets.filter(x => x.weight || x.reps);

    const SB_HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };
    async function fetchBin() {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), 8000);
      try {
        const r = await fetch(`${SB_URL}/rest/v1/workout_data?select=data&id=eq.1`, { headers: SB_HEADERS, signal: ctrl.signal });
        if (!r.ok) throw new Error('fetch failed');
        const rows = await r.json();
        return rows[0]?.data || null;
      } finally {
        clearTimeout(t);
      }
    }
    async function putBin(data) {
      const r = await fetch(`${SB_URL}/rest/v1/workout_data`, {
        method: 'POST',
        headers: { ...SB_HEADERS, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify([{ id: 1, data }])
      });
      if (!r.ok) throw new Error('put failed');
    }

    function showSync(status, msg) {
      const el = document.getElementById('sync-bar');
      if (!el) return;
      const dc = { syncing: 'amber', synced: 'green', error: 'red', offline: 'amber' }[status] || 'green';
      el.innerHTML = `<span class="dot ${dc}"></span>${msg}`;
      el.style.display = 'flex';
      if (status === 'synced') setTimeout(() => { if (el) el.style.display = 'none'; }, 3500);
    }

    async function load() {
      // Show local data immediately so the app is never blank
      const local = loadLocal();
      if (local) {
        sessions = local.sessions;
        customExercises = migrateCustomEx(local.customExercises);
        customProfiles = local.customProfiles || [];
        baseProfileOverrides = local.baseProfileOverrides || {};
        plans = local.plans || [];
        buildProfiles();
        migrateNames();
        render();
      }

      // Sync with Supabase in the background
      try {
        const rec = await fetchBin();
        if (rec && rec.sessions && rec.sessions.length) {
          const localSnap = sessions;
          const merged = rec.sessions.map(rs => { const ls = localSnap.find(s => s.id === rs.id); return (ls && ls.exercises.length > rs.exercises.length) ? ls : rs; });
          const remoteIds = new Set(rec.sessions.map(s => s.id));
          sessions = [...merged, ...localSnap.filter(s => !remoteIds.has(s.id))];
          customExercises = mergeCustomEx(customExercises, migrateCustomEx(rec.customExercises));
          const remProf = rec.customProfiles || [];
          const remProfIds = new Set(remProf.map(p => p.id));
          customProfiles = [...remProf, ...customProfiles.filter(p => !remProfIds.has(p.id))];
          baseProfileOverrides = { ...(rec.baseProfileOverrides || {}), ...baseProfileOverrides };
          const remPlans = rec.plans || [];
          const remPlanIds = new Set(remPlans.map(pl => pl.id));
          plans = [...remPlans, ...plans.filter(pl => !remPlanIds.has(pl.id))];
          buildProfiles();
          saveLocal();
        } else if (!local) {
          sessions = [...SEED];
          await putBin({ sessions, customExercises: [], customProfiles: [], baseProfileOverrides: {} });
          saveLocal();
        }
        migrateNames();
      } catch {
        if (!local) {
          sessions = [...SEED];
          migrateNames();
        }
        render();
        showSync('offline', local ? 'Offline — showing last saved data' : 'Could not reach server — showing sample data');
      }

    async function save() {

      html += `<div class="sec-label">Add exercise</div><div style="display:flex;gap:8px;margin-bottom:8px"><select id="ex-sel" style="flex:1"><option value="">Select exercise...</option>`;
      for (const e of allEx()) html += `<option value="${e}">${e}</option>`;
      html += `</select><button onclick="addExFromSel()">Add</button></div><div style="display:flex;gap:8px;margin-bottom:16px"><input id="custom-ex" type="text" placeholder="Or type a custom exercise..." style="flex:1"><button onclick="addCustomEx()">Add</button></div>`;
      html += `<div class="sec-label">Session notes</div><textarea id="sess-note" placeholder="How did it feel? PRs?" style="margin-bottom:16px">${draft.note || ''}</textarea>`;
      html += `<button class="btn-primary" style="width:100%;padding:12px;font-size:15px" onclick="saveSession()">${editing ? 'Update session' : 'Save session'}</button>`;
      return html;
    }

    function renderHistory() {
      const ss = profileSessions();
      if (!ss.length) return `<div class="empty">No sessions yet.<br>Start a workout to see history here.</div>`;
      let html = '';
      for (const s of ss) {
        const vol = sessionVolume(s);
        const muscles = [...new Set(s.exercises.flatMap(e => MUSCLE_MAP[e.name] || []))];
        html += `<div class="history-entry"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="font-size:13px;font-weight:500">${fmt(s.date)}</div><div style="display:flex;gap:6px"><button class="btn-sm" onclick="editSession('${s.id}')">Edit</button><button class="btn-danger btn-sm" onclick="delSession('${s.id}')">Delete</button></div></div>`;
        if (muscles.length || vol > 0) {
          html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="display:flex;flex-wrap:wrap;gap:3px">${muscles.map(g => { const c = MUSCLE_COLORS[g] || { bg: '#F1EFE8', color: '#5F5E5A' }; return `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:${c.bg};color:${c.color};font-weight:500">${g}</span>`; }).join('')}</div>${vol > 0 ? `<span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;margin-left:8px">${vol.toLocaleString()} lbs</span>` : ''}</div>`;
        }
        for (const e of s.exercises) {
          const v = e.sets.filter(x => x.weight || x.reps);
          if (!v.length) continue;
          const mx = Math.max(0, ...v.map(x => parseFloat(x.weight) || 0));
          let str, badge;
          if (e.cardio) {
            str = v.map(x => `${x.weight || '?'}min${x.reps ? `/${x.reps}mi` : ''}`).join('  ');
            badge = mx > 0 ? `<span class="badge badge-accent" style="margin-left:6px;font-size:10px">${mx} min</span>` : '';
          } else if (e.bodyweight) {
            str = v.map(x => `BW×${x.reps || '?'}`).join('  ');
            badge = '';
          } else {
            str = v.map(x => `${x.weight || '?'}×${x.reps || '?'}`).join('  ');
            badge = mx > 0 ? `<span class="badge badge-accent" style="margin-left:6px;font-size:10px">${mx} lbs</span>` : '';
          }
          html += `<div style="font-size:13px;margin-bottom:3px"><span style="font-weight:500">${e.name}</span><span class="muted" style="margin-left:6px;font-size:12px">${str}</span>${badge}</div>`;
          if (e.note) html += `<div style="font-size:11px;color:var(--color-text-tertiary);font-style:italic;margin-bottom:2px">${e.note}</div>`;
        }
        if (s.note) html += `<div style="font-size:12px;font-style:italic;color:var(--color-text-secondary);margin-top:6px;padding-top:6px;border-top:0.5px solid var(--color-border-tertiary)">${s.note}</div>`;
        html += `</div>`;
      }
      return html;
    }

    function renderProgress(p) {
      const ss = profileSessions();
      if (!ss.length) return `<div class="empty">Log sessions to see progress.</div>`;

      const toggle = `<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
        <button class="${progressMode === 'progress' ? 'btn-primary' : ''} btn-sm" onclick="progressMode='progress';render()">Progress</button>
        <button class="${progressMode === 'best' ? 'btn-primary' : ''} btn-sm" onclick="progressMode='best';render()">Personal bests</button>
        <button class="${progressMode === 'guide' ? 'btn-primary' : ''} btn-sm" onclick="progressMode='guide';render()">Guide</button>
      </div>`;

      if (progressMode === 'best') {
        const best = {};
        for (const s of ss) {
          for (const e of s.exercises) {
            const isCardio = !!e.cardio;
            const isBW = !isCardio && (e.bodyweight || e.sets.every(x => !x.weight));
            for (const x of e.sets) {
              const w = parseFloat(x.weight) || 0;
              const r = parseFloat(x.reps) || 0;
              if (!w && !r) continue;
              const cur = best[e.name];
              if (!cur || w > cur.weight || (w === cur.weight && r > cur.reps))
                best[e.name] = { weight: w, reps: r, date: s.date, bw: isBW, cardio: isCardio };
            }
          }
        }
        const entries = Object.entries(best).sort((a, b) => a[0].localeCompare(b[0]));
        if (!entries.length) return toggle + `<div class="empty">No sets logged yet.</div>`;
        let html = toggle;
        for (const [name, d] of entries) {
          let setStr;
          if (d.cardio) setStr = `${d.weight} min${d.reps ? ` / ${d.reps} mi` : ''}`;
          else if (d.bw) setStr = `BW × ${d.reps} reps`;
          else setStr = `${d.weight} lbs × ${d.reps} reps`;
          const e1rm = (d.bw || d.cardio) ? 0 : bestEst1RM(name);
          const expanded = expandedExercise === name;
          html += `<div onclick="toggleExpandEx('${name}')" style="margin-bottom:8px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid ${expanded ? p.color : 'var(--color-border-tertiary)'};cursor:pointer">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><div style="font-size:14px;font-weight:500;margin-bottom:2px">${name}</div><div style="font-size:12px;color:var(--color-text-secondary)">${fmt(d.date)}</div></div>
              <div style="text-align:right"><div style="font-size:13px;font-weight:500;color:${p.color}">${setStr}</div>${e1rm ? `<div style="font-size:11px;color:var(--color-text-secondary)">Est. 1RM: ${e1rm} lbs</div>` : ''}</div>
            </div>
            ${expanded ? exerciseChartHTML(name, p.color) : ''}
          </div>`;
        }
        return html;
      }

      if (progressMode === 'guide') {
        const guideToggle = `<div style="display:flex;gap:4px;margin-bottom:12px" onclick="event.stopPropagation()">
          <button class="btn-sm${guideBase === 'e1rm' ? ' btn-primary' : ''}" onclick="guideBase='e1rm';render()" style="font-size:11px">Est. 1RM</button>
          <button class="btn-sm${guideBase === 'max' ? ' btn-primary' : ''}" onclick="guideBase='max';render()" style="font-size:11px">Actual max</button>
        </div>`;
        const best = {};
        for (const s of ss) {
          if (draft && s.id === draft.id) continue;
          for (const e of s.exercises) {
            if (e.cardio) continue;
            const mx = Math.max(0, ...e.sets.map(x => parseFloat(x.weight) || 0));
            const mr = Math.max(0, ...e.sets.map(x => parseFloat(x.reps) || 0));
            const isBW = e.bodyweight || mx === 0;
            if (isBW) {
              if (!best[e.name] || mr > best[e.name].reps) best[e.name] = { bw: true, reps: mr };
            } else if (guideBase === 'e1rm') {
              const e1rm = Math.max(0, ...e.sets.map(x => calcEst1RM(parseFloat(x.weight) || 0, parseFloat(x.reps) || 0)));
              if (e1rm && (!best[e.name] || e1rm > best[e.name].base)) best[e.name] = { bw: false, base: e1rm, label: `Est. 1RM: ${e1rm} lbs` };
            } else {
              if (mx && (!best[e.name] || mx > best[e.name].base)) best[e.name] = { bw: false, base: mx, label: `Max: ${mx} lbs` };
            }
          }
        }
        const presets = [
          { label: 'Strength', pct: 0.85, reps: '3–5', sets: 4, col: '#1A5E9E', bg: '#EBF3FF' },
          { label: 'Hypertrophy', pct: 0.70, reps: '8–12', sets: 3, col: '#6B3BA3', bg: '#F2EBFE' },
          { label: 'Endurance', pct: 0.60, reps: '15–20', sets: 3, col: '#1A7A3A', bg: '#E1F5EE' },
        ];
        const entries = Object.entries(best).sort((a, b) => a[0].localeCompare(b[0]));
        if (!entries.length) return toggle + guideToggle + `<div class="empty">No history to base recommendations on.</div>`;
        let html = toggle + guideToggle;
        for (const [name, d] of entries) {
          html += `<div style="margin-bottom:8px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)">`;
          html += `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px"><div style="font-size:14px;font-weight:500">${name}</div><div style="font-size:11px;color:var(--color-text-secondary)">${d.label || ''}</div></div>`;
          if (d.bw) {
            html += `<div style="font-size:12px;color:var(--color-text-secondary)">Best: BW × ${d.reps} reps — aim to add reps each session</div>`;
          } else {
            for (const pr of presets) {
              const w = Math.round(d.base * pr.pct / 2.5) * 2.5;
              html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:0.5px solid var(--color-border-tertiary)"><span class="badge" style="background:${pr.bg};color:${pr.col}">${pr.label}</span><span style="font-size:12px;color:var(--color-text-secondary)">${pr.sets} sets × ${pr.reps} reps</span><span style="font-size:13px;font-weight:500">${w} lbs <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)">(${Math.round(pr.pct * 100)}%)</span></span></div>`;
            }
          }
          html += `</div>`;
        }
        return html;
      }

      const map = {};
      for (const s of [...ss].reverse()) {
        for (const e of s.exercises) {
          const isCardio = !!e.cardio;
          const mx = Math.max(0, ...e.sets.map(x => parseFloat(x.weight) || 0));
          const mr = Math.max(0, ...e.sets.map(x => parseFloat(x.reps) || 0));
          const isBW = !isCardio && (e.bodyweight || mx === 0);
          const val = isCardio ? mx : isBW ? mr : mx;
          if (!val) continue;
          if (!map[e.name]) map[e.name] = { first: val, last: val, peak: val, count: 0, bw: isBW, cardio: isCardio };
          else { map[e.name].last = val; if (val > map[e.name].peak) map[e.name].peak = val; }
          map[e.name].count++;
        }
      }
      const entries = Object.entries(map).sort((a, b) => a[0].localeCompare(b[0]));
      if (!entries.length) return toggle + `<div class="empty">Add weights to sets to track progress.</div>`;
      let html = toggle + `<div class="sec-label">Strength progress</div>`;
      for (const [name, d] of entries) {
        const pct = d.first > 0 ? Math.round(((d.last - d.first) / d.first) * 100) : 0;
        const barW = d.peak > 0 ? Math.round((d.last / d.peak) * 100) : 100;
        const col = pct > 0 ? '#0F6E56' : pct < 0 ? '#A32D2D' : '#5F5E5A';
        const bg = pct > 0 ? '#E1F5EE' : pct < 0 ? '#FCEBEB' : '#F1EFE8';
        const unit = d.cardio ? 'min' : d.bw ? 'reps' : 'lbs';
        const expanded = expandedExercise === name;
        html += `<div onclick="toggleExpandEx('${name}')" style="margin-bottom:8px;padding:10px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid ${expanded ? p.color : 'var(--color-border-tertiary)'};cursor:pointer"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:14px;font-weight:500">${name}</span><span class="badge" style="background:${bg};color:${col}">${pct > 0 ? '+' : ''}${pct}%</span></div><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px"><span>Start: ${d.first} ${unit}</span><span>Now: ${d.last} ${unit}</span><span>Peak: ${d.peak} ${unit}</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${barW}%;background:${p.color}"></div></div>${expanded ? exerciseChartHTML(name, p.color) : ''}</div>`;
      }
      return html;
    }

    function renderSettings(p) {
      let html = '';

      // User card
      html += `<div style="display:flex;align-items:center;gap:12px;padding:14px;background:var(--color-background-secondary);border-radius:12px;border:0.5px solid var(--color-border-tertiary);margin-bottom:16px">`;
      html += `<span style="width:44px;height:44px;border-radius:50%;background:${p.color};display:inline-flex;align-items:center;justify-content:center;font-size:16px;color:${p.bg};font-weight:600;flex-shrink:0">${p.initials}</span>`;
      html += `<div><div style="font-size:16px;font-weight:500">${p.name}</div><div class="muted">${profileSessions().length} sessions logged</div></div>`;
      html += `</div>`;

      // Per-user actions
      html += `<div class="sec-label">Account</div>`;
      html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">`;
      html += `<button onclick="exportData()">Export my sessions</button>`;
      if (p.custom) {
        html += `<button class="btn-danger" onclick="confirmDeleteProfile('${p.id}')">Delete account</button>`;
      }
      html += `</div>`;

      // Edit profile colour (all profiles) and name (custom only)
      const currentColorIdx = PRESET_COLORS.findIndex(c => c.color === p.color);
      if (currentColorIdx >= 0) selectedColorIdx = currentColorIdx;
      const editColorIdx = currentColorIdx >= 0 ? currentColorIdx : selectedColorIdx;
      html += `<div class="sec-label">Edit profile</div>`;
      html += `<div style="padding:12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary);margin-bottom:16px">`;
      if (p.custom) html += `<input id="edit-profile-name" type="text" value="${p.name}" placeholder="Name" style="margin-bottom:8px">`;
      html += `<div style="display:flex;gap:8px;margin-bottom:10px">${PRESET_COLORS.map((c, i) => `<div id="cs-${i}" onclick="selectColor(${i})" style="width:28px;height:28px;border-radius:50%;background:${c.color};cursor:pointer;border:2px solid ${i === editColorIdx ? 'var(--color-text-primary)' : 'transparent'}"></div>`).join('')}</div>`;
      html += `<button onclick="saveProfileEdit('${p.id}')">Save changes</button>`;
      html += `</div>`;

      // Global: rename exercise
      html += `<div class="sec-label">Exercise names</div>`;
      const exNames = [...new Set(profileSessions().flatMap(s => s.exercises.map(e => e.name)))].sort();
      html += `<div style="padding:12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)">`;
      html += `<div style="font-size:13px;font-weight:500;margin-bottom:10px">Rename in my sessions</div>`;
      html += `<select id="rename-from" style="margin-bottom:8px"><option value="">Select exercise...</option>${exNames.map(n => `<option value="${n}">${n}</option>`).join('')}</select>`;
      html += `<div style="display:flex;gap:8px"><input id="rename-to" type="text" placeholder="New name" style="flex:1"><button onclick="renameExercise()">Rename</button></div>`;
      html += `</div>`;
      return html;
    }

    function renderAddUser() {
      let html = `<div style="padding:16px;background:var(--color-background-secondary);border-radius:12px;border:0.5px solid var(--color-border-tertiary)">`;
      html += `<div style="font-size:15px;font-weight:500;margin-bottom:14px">New user</div>`;
      html += `<input id="new-profile-name" type="text" placeholder="Name" style="margin-bottom:10px">`;
      html += `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">Pick a colour</div>`;
      html += `<div style="display:flex;gap:8px;margin-bottom:16px">${PRESET_COLORS.map((c, i) => `<div id="cs-${i}" onclick="selectColor(${i})" style="width:32px;height:32px;border-radius:50%;background:${c.color};cursor:pointer;border:2px solid ${i === selectedColorIdx ? 'var(--color-text-primary)' : 'transparent'}"></div>`).join('')}</div>`;
      html += `<button class="btn-primary" style="width:100%;padding:11px" onclick="addProfile()">Create user</button>`;
      html += `</div>`;
      return html;
    }

    function renderConfirm() {
      if (!pendingAction) return `<div class="empty">Nothing to confirm.</div>`;
      return `<div style="padding:48px 16px;text-align:center;max-width:380px;margin:0 auto">
        <div style="font-size:19px;font-weight:600;margin-bottom:10px">Are you sure?</div>
        <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:28px;line-height:1.6">${pendingAction.msg}</div>
        <div style="display:flex;gap:10px;justify-content:center">
          <button class="btn-danger" style="padding:10px 28px;font-size:15px" onclick="doConfirm()">Yes, delete</button>
          <button style="padding:10px 28px;font-size:15px" onclick="cancelConfirm()">Cancel</button>
        </div>
      </div>`;
    }

    function askConfirm(msg, fn, backView) { pendingAction = { msg, fn, backView: backView || view }; view = 'confirm'; render(); }
    async function doConfirm() {
      if (!pendingAction) return;
      const bv = pendingAction.backView;
      await pendingAction.fn();
      pendingAction = null;
      view = bv;
      render();
    }
    function cancelConfirm() { view = pendingAction ? pendingAction.backView : 'log'; pendingAction = null; render(); }

    function saveProfileEdit(id) {
      const c = PRESET_COLORS[selectedColorIdx];
      if (BASE_PROFILES.some(p => p.id === id)) {
        baseProfileOverrides[id] = { color: c.color, bg: c.bg };
      } else {
        const nameEl = document.getElementById('edit-profile-name');
        if (!nameEl || !nameEl.value.trim()) { alert('Enter a name.'); return; }
        const name = nameEl.value.trim();
        const p = customProfiles.find(p => p.id === id);
        if (!p) return;
        p.name = name; p.color = c.color; p.bg = c.bg; p.initials = name.slice(0, 2).toUpperCase();
      }
      buildProfiles();
      save(); render();
    }

    function confirmDeleteProfile(id) {
      const p = PROFILES.find(p => p.id === id);
      if (!p) return;
      const count = profileSessions(id).length;
      askConfirm(`Delete ${p.name} and all ${count} of their sessions? This cannot be undone.`, async () => {
        customProfiles = customProfiles.filter(cp => cp.id !== id);
        sessions = sessions.filter(s => s.profile !== id);
        buildProfiles();
        if (activeProfile === id) activeProfile = BASE_PROFILES[0].id;
        await save();
      }, 'settings');
    }

    function renameExercise() {
      const from = document.getElementById('rename-from');
      const to = document.getElementById('rename-to');
      if (!from || !to || !from.value || !to.value.trim()) { alert('Select an exercise and enter a new name.'); return; }
      const oldName = from.value;
      const newName = to.value.trim();
      for (const s of profileSessions()) { for (const e of s.exercises) { if (e.name === oldName) e.name = newName; } }
      const pEx = customExercises[activeProfile] || [];
      const idx = pEx.indexOf(oldName);
      if (idx >= 0) pEx[idx] = newName;
      save(); render();
    }

    function selectColor(i) {
      selectedColorIdx = i;
      PRESET_COLORS.forEach((_, j) => {
        const el = document.getElementById(`cs-${j}`);
        if (el) el.style.borderColor = j === i ? 'var(--color-text-primary)' : 'transparent';
      });
    }

    function addProfile() {
      const nameEl = document.getElementById('new-profile-name');
      if (!nameEl || !nameEl.value.trim()) { alert('Enter a name.'); return; }
      const name = nameEl.value.trim();
      const c = PRESET_COLORS[selectedColorIdx];
      const id = name.toLowerCase().replaceAll(/[^a-z0-9]/g, '_') + '_' + Date.now().toString(36);
      customProfiles.push({ id, name, color: c.color, bg: c.bg, initials: name.slice(0, 2).toUpperCase(), custom: true });
      PROFILES = [...BASE_PROFILES, ...customProfiles];
      activeProfile = id;
      selectedColorIdx = 0;
      save();
      view = 'log';
      render();
    }

    function exportData() {
      const p = profile();
      const userSessions = profileSessions();
      const blob = new Blob([JSON.stringify({ profile: p.name, sessions: userSessions }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${p.name.toLowerCase()}-workouts-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function switchProfile(id) { activeProfile = id; localStorage.setItem('wt-profile', id); draft = null; planEditDraft = null; render(); }
    function setView(v) { view = v; render(); }
    function startSession() { const todayId = todaySessionId(); const existing = sessions.find(s => s.id === todayId); draft = existing ? structuredClone(existing) : { id: todayId, profile: activeProfile, date: Date.now(), exercises: [], note: '' }; editing = false; render(); }
    function cancelSession() { draft = null; editing = false; render(); }

    async function saveSession() {
      const n = document.getElementById('sess-note');
      if (n) draft.note = n.value;
      if (!draft.exercises.length) { alert('Add at least one exercise.'); return; }
      const idx = sessions.findIndex(s => s.id === draft.id);
      if (idx >= 0) sessions[idx] = draft; else sessions.push(draft);
      editing = false;
      draft = null;
      await save(); view = 'history'; render();
    }
    function delSession(id) {
      const s = sessions.find(s => s.id === id);
      if (!s) return;
      askConfirm(`Delete the session from ${fmt(s.date)}? This cannot be undone.`, async () => {
        sessions = sessions.filter(x => x.id !== id);
        await save();
      }, 'history');
    }
    function editSession(id) {
      const s = sessions.find(s => s.id === id);
      if (!s) return;
      activeProfile = s.profile;
      draft = structuredClone(s);
      editing = true;
      view = 'log';
      render();
    }
    function addExFromSel() {
      const s = document.getElementById('ex-sel');
      if (!s || !s.value) return;
      saveNote();
      draft.exercises.push({ name: s.value, sets: [{ weight: '', reps: '' }], note: '' });
      render();
      autoSave();
    }
    function addCustomEx() {
      const i = document.getElementById('custom-ex');
      if (!i || !i.value.trim()) return;
      const n = i.value.trim();
      if (!customExercises[activeProfile]) customExercises[activeProfile] = [];
      if (!customExercises[activeProfile].includes(n) && !EXERCISES.includes(n)) customExercises[activeProfile].push(n);
      saveNote();
      draft.exercises.push({ name: n, sets: [{ weight: '', reps: '' }], note: '' });
      render();
      autoSave();
    }
    function removeEx(ei) { saveNote(); draft.exercises.splice(ei, 1); render(); autoSave(); }
    function addSet(ei) { saveNote(); draft.exercises[ei].sets.push({ weight: '', reps: '' }); render(); autoSave(); }
    function removeSet(ei, si) {
      saveNote();
      draft.exercises[ei].sets.splice(si, 1);
      if (!draft.exercises[ei].sets.length) draft.exercises[ei].sets.push({ weight: '', reps: '' });
      render();
      autoSave();
    }
    function updSet(ei, si, f, v) { draft.exercises[ei].sets[si][f] = v; autoSave(); }
    function saveNote() { const n = document.getElementById('sess-note'); if (n && draft) draft.note = n.value; }

    globalThis.addEventListener('offline', () => {
      showSync('offline', 'No internet — changes saved locally');
    });
    globalThis.addEventListener('online', async () => {
      showSync('syncing', 'Back online — syncing...');
      try {
        const rec = await fetchBin();
        if (rec && rec.sessions && rec.sessions.length) {
          const localSnap = sessions;
          const merged = rec.sessions.map(rs => { const ls = localSnap.find(s => s.id === rs.id); return (ls && ls.exercises.length > rs.exercises.length) ? ls : rs; });
          const remoteIds = new Set(rec.sessions.map(s => s.id));
          sessions = [...merged, ...localSnap.filter(s => !remoteIds.has(s.id))];
          customExercises = mergeCustomEx(customExercises, migrateCustomEx(rec.customExercises));
          const remProf2 = rec.customProfiles || [];
          const remProfIds2 = new Set(remProf2.map(p => p.id));
          customProfiles = [...remProf2, ...customProfiles.filter(p => !remProfIds2.has(p.id))];
          baseProfileOverrides = { ...(rec.baseProfileOverrides || {}), ...baseProfileOverrides };
          const remPlans2 = rec.plans || [];
          const remPlanIds2 = new Set(remPlans2.map(pl => pl.id));
          plans = [...remPlans2, ...plans.filter(pl => !remPlanIds2.has(pl.id))];
          buildProfiles();
          migrateNames();
          saveLocal();
        }
        await putBin({ sessions, customExercises, customProfiles, baseProfileOverrides, plans });
        showSync('synced', 'Back online — synced');
        render();
      } catch {
        showSync('error', 'Sync failed');
      }
    });

    function renderPlans(p) {
      if (planEditDraft) {
        const isNew = !planEditDraft.id;
        let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:16px;font-weight:500">${isNew ? 'New plan' : 'Edit plan'}</div><button class="btn-sm" onclick="planEditDraft=null;render()">Cancel</button></div>`;
        html += `<input id="plan-name" type="text" placeholder="Plan name (e.g. Push Day)" value="${planEditDraft.name}" oninput="planEditDraft.name=this.value" style="margin-bottom:12px">`;
        if (planEditDraft.exercises.length) {
          html += `<div style="display:grid;grid-template-columns:1fr 52px 68px auto;gap:6px;margin-bottom:4px;font-size:11px;color:var(--color-text-secondary);padding:0 2px"><span>Exercise</span><span style="text-align:center">Sets</span><span style="text-align:center">Reps</span><span></span></div>`;
        }
        for (let i = 0; i < planEditDraft.exercises.length; i++) {
          const pe = planEditDraft.exercises[i];
          html += `<div style="display:grid;grid-template-columns:1fr 52px 68px auto;gap:6px;align-items:center;margin-bottom:4px">`;
          html += `<select onchange="planEditDraft.exercises[${i}].name=this.value"><option value="">Select...</option>`;
          for (const e of allEx()) html += `<option value="${e}"${pe.name === e ? ' selected' : ''}>${e}</option>`;
          html += `</select>`;
          html += `<input type="number" value="${pe.sets}" min="1" max="20" placeholder="Sets" onchange="planEditDraft.exercises[${i}].sets=parseInt(this.value)||3" style="text-align:center;padding:7px 4px">`;
          html += `<input type="text" value="${pe.reps}" placeholder="e.g. 8–12" onchange="planEditDraft.exercises[${i}].reps=this.value" style="text-align:center;padding:7px 4px">`;
          html += `<button class="btn-sm btn-danger" onclick="planEditDraft.exercises.splice(${i},1);render()" style="padding:5px 8px">✕</button>`;
          html += `</div>`;
          html += `<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap">`;
          for (const lvl of INTENSITY_LEVELS) {
            const active = pe.intensity === lvl.key;
            html += `<button onclick="planEditDraft.exercises[${i}].intensity=planEditDraft.exercises[${i}].intensity==='${lvl.key}'?null:'${lvl.key}';render()" style="font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid ${active ? lvl.color : 'var(--color-border-secondary)'};background:${active ? lvl.bg : 'transparent'};color:${active ? lvl.color : 'var(--color-text-secondary)'}">${lvl.label}</button>`;
          }
          html += `</div>`;
        }
        html += `<button onclick="planEditDraft.exercises.push({name:'',sets:3,reps:'8–12',intensity:null});render()" style="width:100%;margin-bottom:16px;font-size:12px;padding:7px;border-style:dashed">+ Add exercise</button>`;
        html += `<button class="btn-primary" style="width:100%;padding:11px" onclick="savePlan()">Save plan</button>`;
        return html;
      }

      const myPlans = plans.filter(pl => pl.profile === activeProfile);
      let html = `<button class="btn-primary" style="width:100%;padding:11px;margin-bottom:16px" onclick="newPlanDraft()">+ New plan</button>`;
      if (!myPlans.length) html += `<div class="empty" style="padding:20px 16px">No plans yet.<br>Create one or copy from another user below.</div>`;
      for (const pl of myPlans) {
        const exList = pl.exercises.filter(e => e.name);
        html += `<div style="margin-bottom:10px;padding:12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)">`;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:15px;font-weight:500">${pl.name}</div><div style="display:flex;gap:6px"><button class="btn-sm" onclick="editPlan('${pl.id}')">Edit</button><button class="btn-danger btn-sm" onclick="deletePlan('${pl.id}')">Delete</button></div></div>`;
        const muscleCount = {};
        for (const pe of exList) for (const m of (MUSCLE_MAP[pe.name] || [])) muscleCount[m] = (muscleCount[m] || 0) + 1;
        if (Object.keys(muscleCount).length) {
          html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;
          for (const [m, n] of Object.entries(muscleCount)) { const c = MUSCLE_COLORS[m] || { bg: '#F1EFE8', color: '#5F5E5A' }; html += `<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${c.bg};color:${c.color};font-weight:500">${m} ${n}</span>`; }
          html += `</div>`;
        }
        for (const pe of exList) {
          const intLvl = INTENSITY_LEVELS.find(l => l.key === pe.intensity);
          const intBadge = intLvl ? `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:${intLvl.bg};color:${intLvl.color};font-weight:500">${intLvl.label}</span>` : '';
          html += `<div style="font-size:13px;display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-top:0.5px solid var(--color-border-tertiary)"><span>${pe.name}</span><div style="display:flex;align-items:center;gap:6px"><span class="muted" style="font-size:12px">${pe.sets} × ${pe.reps}</span>${intBadge}</div></div>`;
        }
        html += `<button class="btn-primary" style="width:100%;margin-top:10px;padding:9px;font-size:13px" onclick="startFromPlan('${pl.id}')">Start from this plan</button>`;
        html += `</div>`;
      }

      const otherPlans = plans.filter(pl => pl.profile !== activeProfile);
      if (otherPlans.length) {
        html += `<div class="sec-label" style="margin-top:8px">From other users</div>`;
        for (const pl of otherPlans) {
          const owner = PROFILES.find(pr => pr.id === pl.profile);
          const exList = pl.exercises.filter(e => e.name);
          html += `<div style="margin-bottom:10px;padding:12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)">`;
          html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">`;
          html += `<div><div style="font-size:15px;font-weight:500">${pl.name}</div>${owner ? `<div style="font-size:11px;color:var(--color-text-secondary)">${owner.name}</div>` : ''}</div>`;
          html += `<button class="btn-sm" onclick="copyPlan('${pl.id}')">Copy to my plans</button>`;
          html += `</div>`;
          const muscleCount2 = {};
          for (const pe of exList) for (const m of (MUSCLE_MAP[pe.name] || [])) muscleCount2[m] = (muscleCount2[m] || 0) + 1;
          if (Object.keys(muscleCount2).length) {
            html += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">`;
            for (const [m, n] of Object.entries(muscleCount2)) { const c = MUSCLE_COLORS[m] || { bg: '#F1EFE8', color: '#5F5E5A' }; html += `<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${c.bg};color:${c.color};font-weight:500">${m} ${n}</span>`; }
            html += `</div>`;
          }
          for (const pe of exList) {
            const intLvl = INTENSITY_LEVELS.find(l => l.key === pe.intensity);
            const intBadge = intLvl ? `<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:${intLvl.bg};color:${intLvl.color};font-weight:500">${intLvl.label}</span>` : '';
            html += `<div style="font-size:13px;display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-top:0.5px solid var(--color-border-tertiary)"><span>${pe.name}</span><div style="display:flex;align-items:center;gap:6px"><span class="muted" style="font-size:12px">${pe.sets} × ${pe.reps}</span>${intBadge}</div></div>`;
          }
          html += `</div>`;
        }
      }

      return html;
    }

    function newPlanDraft() { planEditDraft = { id: null, name: '', profile: activeProfile, exercises: [{ name: '', sets: 3, reps: '8–12', intensity: null }] }; render(); }

    function editPlan(id) { const pl = plans.find(p => p.id === id); if (!pl) return; planEditDraft = structuredClone(pl); render(); }

    function copyPlan(id) {
      const pl = plans.find(p => p.id === id);
      if (!pl) return;
      const copy = structuredClone(pl);
      copy.id = 'plan_' + uid();
      copy.profile = activeProfile;
      plans.push(copy);
      save(); render();
    }

    function savePlan() {
      const nameEl = document.getElementById('plan-name');
      if (!nameEl || !nameEl.value.trim()) { alert('Enter a plan name.'); return; }
      planEditDraft.name = nameEl.value.trim();
      planEditDraft.exercises = planEditDraft.exercises.filter(e => e.name);
      if (!planEditDraft.exercises.length) { alert('Add at least one exercise.'); return; }
      if (!planEditDraft.id) {
        planEditDraft.id = 'plan_' + uid();
        planEditDraft.profile = activeProfile;
        plans.push({ ...planEditDraft });
      } else {
        const idx = plans.findIndex(pl => pl.id === planEditDraft.id);
        if (idx >= 0) plans[idx] = { ...planEditDraft };
      }
      planEditDraft = null;
      save(); render();
    }

    function deletePlan(id) {
      const pl = plans.find(p => p.id === id);
      if (!pl) return;
      askConfirm(`Delete the plan "${pl.name}"? This cannot be undone.`, async () => {
        plans = plans.filter(p => p.id !== id);
        await save();
      }, 'plans');
    }

    function startFromPlan(planId) {
      const plan = plans.find(pl => pl.id === planId);
      if (!plan) return;
      const todayId = todaySessionId();
      const existing = sessions.find(s => s.id === todayId);
      draft = existing ? structuredClone(existing) : { id: todayId, profile: activeProfile, date: Date.now(), exercises: [], note: '' };
      for (const pe of plan.exercises) {
        if (!pe.name) continue;
        if (!draft.exercises.find(e => e.name === pe.name)) {
          let suggestedWeight = '';
          if (pe.intensity) {
            const lvl = INTENSITY_LEVELS.find(l => l.key === pe.intensity);
            const best = maxWeight(pe.name);
            if (lvl && best > 0) suggestedWeight = String(Math.round(best * lvl.pct / 2.5) * 2.5);
          }
          draft.exercises.push({ name: pe.name, sets: Array.from({ length: pe.sets || 3 }, () => ({ weight: suggestedWeight, reps: '' })), note: '' });
        }
      }
      editing = false;
      view = 'log';
      render();
    }

    async function init() {
      if ('serviceWorker' in navigator) {
        try { await navigator.serviceWorker.register('./sw.js'); }
        catch (e) { console.warn('SW registration failed:', e); }
      }
      document.getElementById('app').innerHTML = '<div class="loading">Connecting to sync server...</div>';
      await load();
      render();
    }
    init();
  </script>
</body>

</html>
